# SPDX-FileCopyrightText: Copyright Preetham Gujjula
# SPDX-License-Identifier: BSD-3-Clause
spec-version: 0.36.0
name:         vcard
version:      0.1.0.0
# synopsis:   Short description of your package
description:  Please see the README on GitHub at <https://github.com/pgujjula/vcard#readme>
# category:   Web
stability:    experimental
github:       "pgujjula/vcard"
author:       "Preetham Gujjula"
maintainer:   "libraries@mail.preetham.io"
copyright:    "Preetham Gujjula"
license:      BSD-3-Clause

tested-with:
- GHC == 8.10.7
- GHC == 9.0.2
- GHC == 9.2.8
- GHC == 9.4.8
- GHC == 9.6.6
- GHC == 9.8.4
- GHC == 9.10.1

extra-doc-files:
- README.md
- CHANGELOG.md
- LICENSES/BSD-3-Clause.txt

language: Haskell2010

default-extensions:
- ImportQualifiedPost

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - text

executables:
  vcard:
    main: Main.hs
    source-dirs: app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - text
    - vcard

tests:
  vcard-tests:
    main: Main.hs
    source-dirs: test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - vcard
    - tasty
    - tasty-hunit

benchmarks:
  proj-benchmarks:
    main: Main.hs
    source-dirs: bench
    ghc-options:
    - -O2
    dependencies:
    - vcard
    - tasty
    - tasty-bench
    - text
